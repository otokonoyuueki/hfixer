<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>h抜きリンク修復ツール</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .container {
    width: 100%;
    max-width: 600px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .subtitle code {
    background: #1a1a2e;
    color: #7eb8ff;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.82rem;
  }
  textarea {
    width: 100%;
    height: 140px;
    background: #111119;
    border: 1.5px solid #2a2a3a;
    border-radius: 10px;
    color: #e0e0e0;
    font-size: 0.95rem;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    line-height: 1.6;
  }
  textarea:focus { border-color: #5b8cff; }
  textarea::placeholder { color: #555; }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  button {
    flex: 1;
    padding: 12px 0;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:active { transform: scale(0.97); }
  .btn-fix {
    background: linear-gradient(135deg, #4a7cff, #6a5aff);
    color: #fff;
  }
  .btn-fix:hover { opacity: 0.9; }
  .btn-clear {
    background: #1a1a2e;
    color: #aaa;
    flex: 0.4;
  }
  .btn-clear:hover { color: #fff; }

  .results {
    margin-top: 28px;
  }
  .results-title {
    font-size: 0.8rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .link-card {
    background: #111119;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .link-card a {
    color: #7eb8ff;
    text-decoration: none;
    word-break: break-all;
    font-size: 0.9rem;
    line-height: 1.4;
    flex: 1;
  }
  .link-card a:hover { text-decoration: underline; }
  .link-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 7px;
    background: #1e1e30;
    border: none;
    color: #aaa;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex: none;
    padding: 0;
  }
  .icon-btn:hover { background: #2a2a44; color: #fff; }
  .icon-btn.copied { background: #1a3a1a; color: #6f6; }
  .no-links {
    text-align: center;
    color: #555;
    font-size: 0.9rem;
    padding: 30px 0;
  }
  .auto-opened {
    text-align: center;
    color: #6f6;
    font-size: 0.95rem;
    padding: 14px 0 4px;
    animation: fadeIn 0.3s ease;
  }
  .count-badge {
    display: inline-block;
    background: #2a2a44;
    color: #7eb8ff;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🔗 h抜きリンク修復</h1>
  <p class="subtitle">
    Xのポストをそのまま貼り付けるだけ。<code>ttps://</code> や <code>ttp://</code> を自動で検出してリンクにします。
  </p>

  <textarea id="input" placeholder="ここにテキストを貼り付け&#10;例: 詳細はこちら → ttps://example.com/page"></textarea>

  <div class="btn-row">
    <button class="btn-fix" onclick="fix()">リンクを修復</button>
    <button class="btn-clear" onclick="clearAll()">クリア</button>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
function fix() {
  const text = document.getElementById('input').value.trim();
  if (!text) return;

  // Match ttp:// or ttps:// (with optional full-width or half-width t)
  const regex = /(?:ｔｔｐｓ|ｔｔｐ|ttps|ttp):\/\/[^\s　\]）)>」』】\u0022\u0027]+/gi;

  // Also normalize full-width colons/slashes
  const normalized = text
    .replace(/：\/\//g, '://')
    .replace(/：／／/g, '://')
    .replace(/／/g, '/');

  const matches = normalized.match(regex);

  const resultsDiv = document.getElementById('results');

  if (!matches || matches.length === 0) {
    resultsDiv.innerHTML = '<p class="no-links">h抜きリンクが見つかりませんでした</p>';
    return;
  }

  // Dedupe
  const unique = [...new Set(matches)];

  const fixed = unique.map(m => {
    let url = m
      .replace(/^ｔｔｐｓ/i, 'ttps')
      .replace(/^ｔｔｐ/i, 'ttp');
    return 'h' + url;
  });

  // 1件だけなら自動で開く
  if (fixed.length === 1) {
    window.open(fixed[0], '_blank');
  }

  let html = '';
  if (fixed.length === 1) {
    html += '<div class="auto-opened">✅ リンクを自動で開きました</div>';
  }
  html += `<div class="results-title">検出されたリンク<span class="count-badge">${fixed.length}件</span></div>`;

  fixed.forEach((url, i) => {
    html += `
      <div class="link-card">
        <a href="${escHtml(url)}" target="_blank" rel="noopener">${escHtml(url)}</a>
        <div class="link-actions">
          <button class="icon-btn" onclick="copyUrl(this, '${escAttr(url)}')" title="コピー">📋</button>
          <button class="icon-btn" onclick="window.open('${escAttr(url)}','_blank')" title="開く">↗</button>
        </div>
      </div>`;
  });

  resultsDiv.innerHTML = html;
}

function copyUrl(btn, url) {
  navigator.clipboard.writeText(url).then(() => {
    btn.classList.add('copied');
    btn.textContent = '✓';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '📋';
    }, 1500);
  });
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('results').innerHTML = '';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

// Auto-fix on paste
document.getElementById('input').addEventListener('paste', () => {
  setTimeout(fix, 100);
});
</script>
</body>
</html>
